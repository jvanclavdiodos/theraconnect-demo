version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: theraconnect-app
    restart: unless-stopped
    working_dir: /var/www
    # The Dockerfile CMD already runs storage:link -> wait-for-db -> migrate
    # -> db:seed -> serve. Override here only if you need a different boot.
    volumes:
      - .:/var/www
      - /var/www/vendor
      - ./.env.docker:/var/www/.env:ro
      - /var/www/bootstrap/cache
    ports:
      - '8080:8080'
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: local
      # Local-dev only — never set APP_DEBUG=true in staging/prod.
      APP_DEBUG: 'true'
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: theraconnect
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-password}
      QUEUE_CONNECTION: database
      SESSION_DRIVER: file
      PHP_CLI_SERVER_WORKERS: 1
      SANCTUM_STATEFUL_DOMAINS: localhost:8080
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_CREDENTIALS: ${FCM_CREDENTIALS:-}
      JITSI_BASE_URL: ${JITSI_BASE_URL:-https://meet.jit.si}
      JITSI_ROOM_PREFIX: ${JITSI_ROOM_PREFIX:-TheraConnect}
      # AWS S3 (optional; falls back to local disk when AWS_BUCKET is empty)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_BUCKET: ${AWS_BUCKET:-}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8080/api/v1/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - theraconnect

  mysql:
    image: mysql:8.0
    container_name: theraconnect-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: theraconnect
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - theraconnect

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: theraconnect-queue
    restart: unless-stopped
    working_dir: /var/www
    # Override the Dockerfile's boot CMD: the worker just needs the DB ready
    # (the app service ran migrations) and the queue:work command.
    command: sh -c "until php artisan db:show > /dev/null 2>&1; do echo 'Waiting for database...'; sleep 2; done && php artisan queue:work --tries=3 --max-time=3600 --sleep=3"
    volumes:
      - .:/var/www
      - /var/www/vendor
      - ./.env.docker:/var/www/.env:ro
      - /var/www/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_healthy
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: theraconnect
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-password}
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_BUCKET: ${AWS_BUCKET:-}
    networks:
      - theraconnect

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: theraconnect-scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "echo '* * * * * cd /var/www && php artisan schedule:run >> /dev/null 2>&1' > /etc/crontabs/root && crond -f -L /dev/stdout"
    volumes:
      - .:/var/www
      - /var/www/vendor
      - ./.env.docker:/var/www/.env:ro
      - /var/www/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_healthy
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: theraconnect
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-password}
    networks:
      - theraconnect

volumes:
  mysql_data:

networks:
  theraconnect:
    driver: bridge
