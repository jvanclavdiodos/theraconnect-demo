# Configuration for `flutter gen-l10n`.
# https://docs.flutter.dev/ui/accessibility-and-internationalization/internationalization
#
# Run `flutter gen-l10n` (or `flutter pub get` — auto-generates on every
# dependency refresh) to regenerate lib/l10n/app_localizations*.dart from
# app_*.arb files.

arb-dir: lib/l10n
template-arb-file: app_en.arb
output-localization-file: app_localizations.dart
