name: theraconnect
description: TheraConnect Patient Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  file_picker: ^8.0.0
  path_provider: ^2.1.5
  open_filex: ^4.5.0
  url_launcher: ^6.3.0
  media_store_plus: ^0.1.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Enables `flutter gen-l10n` to auto-generate the AppLocalizations class
  # from lib/l10n/app_*.arb files. The generated code (app_localizations.dart
  # + app_localizations_en.dart etc.) lands in lib/l10n/ — already covered
  # by .gitignore on most projects; commit it so engines without gen-l10n
  # (e.g. CI builds) don't need to regenerate.
  generate: true

