; TheraConnect PHP runtime config for the Docker image.
; Mounted into /usr/local/etc/php/conf.d/ by the Dockerfile build.
;
; upload_max_filesize / post_max_size: lift above the app's in-app max rules
; (10 MB submissions, 4 MB avatars) so the FormRequest validator surfaces the
; friendly "must not be greater than X MB" message rather than the opaque
; PostTooLargeException 413 page. Keep a margin so multipart encoding overhead
; does not trip post_max_size before the file payload itself is measured.
upload_max_filesize = 12M
post_max_size = 12M

; Suppress the X-Powered-By response header that exposes the PHP version. The
; SecurityHeaders middleware also calls header_remove() at runtime, but this
; is the SAPI-level guard (covers `artisan serve` + php-fpm alike).
expose_php = Off

; Log to stderr so PaaS log drains (Railway, Render, Fly.io) capture them. The
; Laravel LOG_STACK=stderr config also writes framework logs here.
log_errors = On
error_log = /proc/self/fd/2
display_errors = Off
display_startup_errors = Off
