version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: theraconnect-local-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: theraconnect_local
    ports:
      - '3307:3306'
    volumes:
      - mysql_local_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_local_data:
